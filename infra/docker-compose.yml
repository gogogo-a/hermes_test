services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.15
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --smp
      - "1"
      - --memory
      - 768M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --default-log-level
      - warn
    ports:
      - "19092:19092"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.13.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
